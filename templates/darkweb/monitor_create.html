{% extends 'base.html' %}
{% block title %}Add Monitor - ThreatShield{% endblock %}
{% block content %}
<div class="page-head"><div><h1>Add Dark Web Monitor</h1><p>Configure monitoring for your organization</p></div></div>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Organization Name</label>
                <input type="text" name="organization_name" class="form-input" placeholder="Your organization name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Domains to Monitor (comma-separated)</label>
                <input type="text" name="domains" class="form-input" placeholder="example.com, app.example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Keywords (comma-separated)</label>
                <input type="text" name="keywords" class="form-input" placeholder="company name, brand, product">
            </div>
            <div class="form-group">
                <label class="form-label">Email Addresses (comma-separated)</label>
                <input type="text" name="emails" class="form-input" placeholder="admin@example.com, ceo@example.com">
            </div>
            <div style="display:flex;gap:8px;margin-top:20px;">
                <button type="submit" class="btn btn-primary">Create Monitor</button>
                <a href="{% url 'darkweb:dashboard' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
